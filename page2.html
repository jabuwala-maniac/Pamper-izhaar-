<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checking On You ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container fade">

<div class="page">
Page 2 of 4 💖
</div>

<div class="progress">
<span style="width:50%"></span>
</div>

<h1>Can I Ask You Something? 🧸</h1>

<img
src="assets/gifs/teddy-love.gif.webp"
class="gif"
alt="Teddy Bear">

<p class="question">

Before we continue...

I just wanted to know how you're feeling today.

No right or wrong answer.

I just want to make sure you're okay. ❤️

</p>

<button class="choice" onclick="showResponse('good')">

😊 I'm Feeling Better

</button>

<button class="choice" onclick="showResponse('okay')">

🙂 I'm Managing

</button>

<button class="choice" onclick="showResponse('bad')">

🥺 Not Feeling Great

</button>

<div
id="response"
class="response hidden">

</div>

<button
id="nextButton"
class="hidden next"
onclick="next('page3.html')">

Continue 🌸

</button>

</div>

<script src="script.js"></script>

<script>

function showResponse(answer){

const response=document.getElementById("response");

const nextBtn=document.getElementById("nextButton");

response.classList.remove("hidden");

nextBtn.classList.remove("hidden");

if(answer==="good"){

response.innerHTML=

"🧸 That makes Teddy really happy! ❤️ Let's keep that smile going.";

}

else if(answer==="okay"){

response.innerHTML=

"🌸 You're doing your best, and that's enough. Remember to rest whenever you need to. 💖";

}

else{

response.innerHTML=

"🥺 Aww... Teddy wishes he could give you the biggest hug right now. Don't worry, Juzer is always thinking about you. ❤️";

}

}

</script>

</body>

</html>
