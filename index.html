<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Little Surprise ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container fade">

<div class="page">
Page 1 of 4 💖
</div>

<div class="progress">
<span style="width:25%"></span>
</div>

<h1>Hello Beautiful ❤️</h1>

<img
src="assets/gifs/200w.webp"
class="gif"
alt="Cute Teddy">

<p id="typing"></p>

<button id="startBtn">
Begin Our Little Journey 🌸
</button>

</div>

<script src="script.js"></script>

<script>

const message =
"🧸 Hi... I'm Juzer's little teddy bear! He asked me to take care of someone very special today. I know today might be a little difficult, but don't worry. I'll stay with you through this tiny journey and make sure you end it with a smile. ❤️";

let i = 0;

function type(){

if(i < message.length){

document.getElementById("typing").innerHTML += message.charAt(i);

i++;

setTimeout(type,35);

}

}

type();

document.getElementById("startBtn").onclick=function(){

document.body.style.opacity="0";

setTimeout(function(){

window.location.href="page2.html";

},500);

}

</script>

</body>

</html>
