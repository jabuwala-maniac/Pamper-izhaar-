<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I'm Here For You ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container fade">

<div class="page">
Page 3 of 4 💖
</div>

<div class="progress">
<span style="width:75%"></span>
</div>

<h1>Just One More Thing 🧸</h1>

<img
src="assets/gifs/cuddle.gif.webp"
class="gif"
alt="Comfort Teddy">

<p class="question">

Thank you for telling me how you're feeling.

Now tell me...

How painful are your cramps today?

</p>

<div class="slider-box">

<input
type="range"
min="1"
max="10"
value="5"
id="painSlider">

<div id="painValue">
5
</div>

<div id="painEmoji" style="font-size:40px;">
😣
</div>

<p id="painText">

🥹 Right in the middle... Please don't overwork yourself today.

</p>

</div>

<button onclick="next('page4.html')">

Continue ❤️

</button>

</div>

<script src="script.js"></script>

<script>

const slider=document.getElementById("painSlider");

const number=document.getElementById("painValue");

const emoji=document.getElementById("painEmoji");

const text=document.getElementById("painText");

const messages={

1:["😊","That's wonderful! Teddy hopes the rest of your day stays comfortable. ❤️"],

2:["🙂","Just a little discomfort. Drink some water and take it easy. 🌸"],

3:["🌷","Teddy thinks you deserve a cozy blanket today. 🧸"],

4:["🥹","Take small breaks and don't push yourself too much. ❤️"],

5:["😣","You're doing your best. I'm proud of you. 💖"],

6:["🥺","Please rest whenever you can. Your comfort matters. 🌸"],

7:["😢","Teddy wishes he could bring you a warm hug right now. 🤍"],

8:["😭","That's really painful... I hope you can relax today. ❤️"],

9:["💔","Juzer is telling you to rest and let him take care of everything today. 🧸"],

10:["🤗","Maximum teddy hugs activated! You are so strong, and you're deeply loved. ❤️"]

};

slider.oninput=function(){

number.innerHTML=this.value;

emoji.innerHTML=messages[this.value][0];

text.innerHTML=messages[this.value][1];

};

</script>

</body>

</html>
